<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, minimal-ui">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
<link rel="apple-touch-startup-image" href="images/apple-touch-startup-image-640x920.png">
<title>POP TO</title>
<link rel="stylesheet" href="css/swiper.css">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,900" rel="stylesheet">
<link href="css/waitMe.css" rel="stylesheet">
<script src="js/sweetalert2.js"></script>
<style>
    img{
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body id="mobile_wrap">

    <div class="panel-overlay"></div>

    <div class="views">

      <div class="view view-main">


        <div class="pages">

          <div data-page="index" class="page homepage">
            <div class="page-content">
			
		<div class="navbar navbar--fixed navbar--fixed-top">
			<div class="navbar__col navbar__col--title">
				<span>POP TO</span>
                <span style="float: right" id="cnt">0</span>
			</div>
                </div>

                  <!-- Slider -->
                 <div class="swiper-container slidertoolbar">
                    <div class="swiper-wrapper">
                      <div class="swiper-slide">
                          <div id="pages_maincontent">
                              <div id="content">
                                  <img id="imgnp" src="np.jpg">
                                  <img id="imgp" src="p.jpg" hidden>
                              </div>
                          </div>
                      </div>
                    </div>
                 </div>

			  
            </div>
          </div>
        </div>



      </div>
    </div>

    <!-- Login Popup -->

<script src="js/jquery-3.3.1.min.js"></script>
<script src="js/jquery.validate.min.js" ></script>
<script src="js/swiper.min.js"></script>
<script src="js/jquery.custom.js"></script>
<script src="js/waitMe.js"></script>
<script>
    var pop = false;
    var cnt = 0;
    var cntdisplay = $("#cnt");
    var imgp = $('#imgp');
    var imgnp = $('#imgnp');
    const audio = new Audio("pop.mp3" );
    $( document ).ready(function() {
        imgnp.on('click',function ()
        {
            pop = true
            cnt++;
            audio.playbackRate = 1.15;
            audio.play();
            imgnp.hide();
            imgp.show();
            cntdisplay.html(cnt);
            setTimeout(function() {
                imgnp.show();
                imgp.hide();
                pop = false;
            }, 50);
        });
    });

</script>
  </body>
</html>
